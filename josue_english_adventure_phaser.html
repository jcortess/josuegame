const GAME_W = 1100;
const GAME_H = 720;
const COLORS = {
  bg: 0x0b1320, panel: 0xf8fbff, navy: 0x1e3b5b, blue: 0x5aa9e6, lightBlue: 0xdcecff,
  green: 0x5ec182, red: 0xd25555, gold: 0xe8bf4d, purple: 0x845bb5, gray: 0x6e788c,
  dark: 0x28303c, white: 0xffffff, black: 0x111111
};
const STORAGE_KEY = "josue-phaser-progress-v1";

function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}
function sample(arr, n) { return shuffle(arr).slice(0, n); }
function loadProgress() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { return {}; } }
function saveProgress(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
async function loadQuestionBank() {
  try {
    const response = await fetch("./question_bank_20_per_topic.json");
    if (!response.ok) throw new Error("No external bank");
    return await response.json();
  } catch (e) {
    return DEFAULT_QUESTION_BANK;
  }
}

class BootScene extends Phaser.Scene {
  constructor() { super("BootScene"); }
  async create() {
    const bank = await loadQuestionBank();
    this.registry.set("questionBank", bank);
    const progress = loadProgress();
    this.registry.set("progress", progress);
    this.scene.start("MenuScene");
  }
}

class BaseScene extends Phaser.Scene {
  constructor(key) {
    super(key);
  }
  createStarfield() {
    const g = this.add.graphics();
    g.fillStyle(COLORS.bg, 1);
    g.fillRect(0, 0, GAME_W, GAME_H);
    for (let i = 0; i < 80; i++) {
      g.fillStyle(0xffffff, Phaser.Math.FloatBetween(0.25, 0.95));
      g.fillCircle(Phaser.Math.Between(0, GAME_W), Phaser.Math.Between(0, GAME_H), Phaser.Math.Between(1, 2));
    }
  }
  drawPanel(x, y, w, h, fill = COLORS.panel, border = COLORS.navy) {
    const box = this.add.graphics();
    box.fillStyle(fill, 1);
    box.lineStyle(3, border, 1);
    box.fillRoundedRect(x, y, w, h, 18);
    box.strokeRoundedRect(x, y, w, h, 18);
    return box;
  }
  drawTitle(text, y = 70, color = "#ffffff", size = 40) {
    return this.add.text(GAME_W / 2, y, text, { fontFamily: "Arial", fontSize: size + "px", color, fontStyle: "bold" }).setOrigin(0.5);
  }
  centerText(x, y, text, size = 24, color = "#ffffff", width = 800) {
    return this.add.text(x, y, text, { fontFamily: "Arial", fontSize: size + "px", color, align: "center", wordWrap: { width } }).setOrigin(0.5);
  }
  getRunState() { return this.registry.get("runState") || {}; }
  setRunState(state) { this.registry.set("runState", state); }
  savePersistentProgress(progressPatch) {
    const current = this.registry.get("progress") || {};
    const next = { ...current, ...progressPatch };
    this.registry.set("progress", next);
    saveProgress(next);
  }
  getQuestionBank() { return this.registry.get("questionBank"); }
}

class MenuScene extends BaseScene {
  constructor() {
     super("MenuScene");
  }
  create() {
    this.createStarfield();
    const progress = this.registry.get("progress") || {};
    this.drawTitle("Josué English Adventure", 80, "#ffffff", 42);
    this.centerText(GAME_W / 2, 130, "HTML5 / Phaser migration of the Pygame version", 22, "#b8c8ff");
    this.centerText(GAME_W / 2, 180, `High Score: ${progress.highScore || 0} ⭐`, 24, "#ffd166");
    this.centerText(GAME_W / 2, 220, `Badges: ${(progress.badges || []).join(", ") || "None yet"}`, 18, "#cdd7ff", 900);
    this.playerName = progress.playerName || "Josué";
    this.timerMode = false;
    this.drawPanel(320, 260, 460, 300, COLORS.panel, COLORS.blue);
    this.nameText = this.centerText(GAME_W / 2, 315, `Player: ${this.playerName}`, 28, "#1e3b5b");
    this.timerText = this.centerText(GAME_W / 2, 360, `Timer Mode: OFF`, 24, "#845bb5");
    const buttons = [
      { label: "Start Adventure", y: 420, action: () => this.startGame() },
      { label: "Toggle Timer", y: 480, action: () => this.toggleTimer() },
      { label: "Change Name", y: 540, action: () => this.changeName() }
    ];
    buttons.forEach(btn => {
      const rect = this.add.rectangle(GAME_W / 2, btn.y, 300, 46, COLORS.blue).setStrokeStyle(2, COLORS.white);
      const txt = this.centerText(GAME_W / 2, btn.y, btn.label, 22, "#ffffff");
      rect.setInteractive({ useHandCursor: true }).on("pointerdown", btn.action);
      txt.setInteractive({ useHandCursor: true }).on("pointerdown", btn.action);
    });
    this.centerText(GAME_W / 2, 640, "If question_bank_20_per_topic.json is beside this file and served over HTTP, the game tries to load it first.", 16, "#90a4d4", 980);
  }
  toggleTimer() {
    this.timerMode = !this.timerMode;
    this.timerText.setText(`Timer Mode: ${this.timerMode ? "ON" : "OFF"}`);
  }
  changeName() {
    const name = window.prompt("Player name", this.playerName);
    if (name && name.trim()) {
      this.playerName = name.trim().slice(0, 20);
      this.nameText.setText(`Player: ${this.playerName}`);
    }
  }
  startGame() {
    const bank = this.getQuestionBank();
    const levels = bank.levels.map(level => ({ ...level, questions: sample(level.questions, Math.min(5, level.questions.length)) }));
    this.setRunState({
      playerName: this.playerName, timerMode: this.timerMode, levels, levelIndex: 0, questionIndex: 0,
      lives: 3, score: 0, highScore: (this.registry.get("progress") || {}).highScore || 0,
      totalCorrect: 0, totalQuestions: 0, weakTopics: {}, badges: [...((this.registry.get("progress") || {}).badges || [])],
      levelReport: [], levelSummaries: [], finalRank: "", finalReport: ""
    });
    this.savePersistentProgress({ playerName: this.playerName });
    this.scene.start("LevelIntroScene");
  }
}

    this.drawTitle(`Level ${state.levelIndex + 1}: ${level.name}`, 90, "#ffffff", 38);
    this.drawPanel(170, 150, 760, 320, COLORS.panel, COLORS.blue);
    this.centerText(GAME_W / 2, 210, `Boss: ${level.boss}`, 30, "#d25555");
    this.centerText(GAME_W / 2, 260, `Topic: ${level.topic}`, 24, "#1e3b5b");
    this.centerText(GAME_W / 2, 340, "Beat 5 random questions to clear the level.", 24, "#28303c");
    this.centerText(GAME_W / 2, 390, "Press SPACE or click to begin.", 22, "#845bb5");
    this.drawMonster(level.boss, 840, 385, 1.15, "idle", 5, 5);
    this.input.keyboard.once("keydown-SPACE", () => this.scene.start("QuestionScene"));
    this.input.once("pointerdown", () => this.scene.start("QuestionScene"));
  }
  drawMonster(name, x, y, scale, mood, hp, maxHp) {
    const g = this.add.graphics();
    const s = scale;
    if (name === "Routine Monster") {
      g.fillStyle(COLORS.green).fillEllipse(x, y, 120 * s, 100 * s);
      g.fillStyle(COLORS.white).fillCircle(x - 22 * s, y - 12 * s, 10 * s).fillCircle(x + 22 * s, y - 12 * s, 10 * s);
      g.fillStyle(COLORS.black).fillCircle(x - 22 * s, y - 12 * s, 4 * s).fillCircle(x + 22 * s, y - 12 * s, 4 * s);
      g.lineStyle(4, COLORS.black).strokePoints([{x:x-24*s,y:y+14*s},{x:x,y:y+24*s},{x:x+24*s,y:y+14*s}], false);
    } else if (name === "Yesterday Dragon") {
      g.fillStyle(0xff8c50).fillEllipse(x, y, 130 * s, 80 * s);
      g.fillTriangle(x + 20*s, y - 35*s, x + 70*s, y - 60*s, x + 45*s, y - 10*s);
      g.fillStyle(COLORS.white).fillCircle(x + 30*s, y - 10*s, 8 * s);
      g.fillStyle(COLORS.black).fillCircle(x + 31*s, y - 10*s, 3 * s);
      g.lineStyle(5, COLORS.red).lineBetween(x + 45*s, y, x + 75*s, y + 16*s);
    } else if (name === "When-While Wizard") {
      g.fillStyle(COLORS.purple).fillEllipse(x, y - 34*s, 70*s, 32*s);
      g.fillStyle(COLORS.purple).fillRect(x - 16*s, y - 30*s, 32*s, 60*s);
      g.fillTriangle(x, y - 8*s, x - 50*s, y + 60*s, x + 50*s, y + 60*s);
      g.fillStyle(COLORS.gold).fillCircle(x + 54*s, y - 42*s, 10*s);
    } else if (name === "Story Giant") {
      g.fillStyle(0x7e8b9f).fillRoundedRect(x - 45*s, y - 55*s, 90*s, 110*s, 18*s);
      g.fillStyle(COLORS.white).fillCircle(x - 18*s, y - 18*s, 8*s).fillCircle(x + 18*s, y - 18*s, 8*s);
      g.fillStyle(COLORS.black).fillCircle(x - 18*s, y - 18*s, 3*s).fillCircle(x + 18*s, y - 18*s, 3*s);
      g.fillStyle(COLORS.red).fillRoundedRect(x - 30*s, y + 10*s, 60*s, 12*s, 6*s);
    } else {
      g.fillStyle(COLORS.purple).fillRoundedRect(x - 50*s, y - 50*s, 100*s, 100*s, 20*s);
      g.fillStyle(COLORS.white).fillCircle(x - 15*s, y - 10*s, 8*s).fillCircle(x + 15*s, y - 10*s, 8*s);
      g.fillStyle(COLORS.black).fillCircle(x - 15*s, y - 10*s, 3*s).fillCircle(x + 15*s, y - 10*s, 3*s);
    }
  }
}

class QuestionScene extends BaseScene {
  constructor() {
    super("QuestionScene");
  }
  create() {
    this.createStarfield();
    this.state = this.getRunState();
    this.level = this.state.levels[this.state.levelIndex];
    this.question = this.level.questions[this.state.questionIndex];
    this.monsterMaxHp = this.level.questions.length;
    this.monsterHp = this.monsterMaxHp - this.state.questionIndex;
    this.monsterMood = "idle";
    this.drawHud();
    this.drawPanel(90, 90, 920, 170, COLORS.panel, COLORS.blue);
    this.centerText(GAME_W / 2, 128, this.question.prompt, 22, "#845bb5");
    this.centerText(GAME_W / 2, 190, this.question.question, 30, "#28303c", 860);
    this.centerText(GAME_W / 2, 280, "Click an answer door or press 1 / 2 / 3", 18, "#90a4d4");
    this.drawMonster(this.level.boss, 130, 575, 0.95, "idle", this.monsterHp, this.monsterMaxHp);
    const positions = [220, 550, 880];
    this.optionBoxes = [];
    shuffle(this.question.options).forEach((opt, idx) => {
      const box = this.add.rectangle(positions[idx], 510, 280, 130, COLORS.blue).setStrokeStyle(3, COLORS.white);
      box.setInteractive({ useHandCursor: true });
      box.on("pointerdown", () => this.submitAnswer(opt));
      const txt = this.add.text(positions[idx], 510, opt, { fontFamily: "Arial", fontSize: "24px", color: "#ffffff", align: "center", wordWrap: { width: 230 } }).setOrigin(0.5);
      txt.setInteractive({ useHandCursor: true });
      txt.on("pointerdown", () => this.submitAnswer(opt));
      this.optionBoxes.push({ box, txt, answer: opt });
    });
    this.feedbackText = this.centerText(300, 620, "Monster is waiting...", 18, "#9fb3d1", 420);
    this.input.keyboard.on("keydown-ONE", () => this.chooseByIndex(0));
    this.input.keyboard.on("keydown-TWO", () => this.chooseByIndex(1));
    this.input.keyboard.on("keydown-THREE", () => this.chooseByIndex(2));
    if (this.state.timerMode) {
      this.timeLeft = 20;
      this.timerText = this.centerText(GAME_W / 2, 40, `⏳ ${this.timeLeft}s`, 22, "#ff8a80");
      this.timerEvent = this.time.addEvent({
        delay: 1000, repeat: 19,
        callback: () => {
          this.timeLeft -= 1;
          this.timerText.setText(`⏳ ${this.timeLeft}s`);
          if (this.timeLeft <= 0) this.submitTimeout();
        }
      });
    }
  }
  drawHud() {
    this.add.rectangle(GAME_W / 2, 35, GAME_W, 70, COLORS.white).setStrokeStyle(2, COLORS.lightBlue);
    this.add.text(20, 18, `${this.state.playerName} | Score: ${this.state.score} ⭐ | Lives: ${"❤️".repeat(this.state.lives)}`, { fontFamily: "Arial", fontSize: "24px", color: "#1e3b5b" });
    this.add.text(GAME_W - 210, 18, `Level ${this.state.levelIndex + 1} / ${this.state.levels.length}`, { fontFamily: "Arial", fontSize: "24px", color: "#1e3b5b" });
  }
  drawMonster(name, x, y, scale, mood, hp, maxHp) {
    const g = this.add.graphics();
    const s = scale;
    const ratio = Math.max(0, hp / Math.max(1, maxHp));
    g.fillStyle(0xdddddd).fillRoundedRect(x - 55, y - 85, 110, 10, 4);
    const hpColor = ratio < 0.4 ? COLORS.red : (ratio < 0.7 ? COLORS.gold : COLORS.green);
    g.fillStyle(hpColor).fillRoundedRect(x - 55, y - 85, 110 * ratio, 10, 4);
    g.lineStyle(2, COLORS.dark).strokeRoundedRect(x - 55, y - 85, 110, 10, 4);
    const cry = mood === "hurt";
    const happy = mood === "happy";
    if (name === "Routine Monster") {
      g.fillStyle(COLORS.green).fillEllipse(x, y, 110 * s, 92 * s);
      g.fillStyle(COLORS.white).fillCircle(x - 20 * s, y - 12 * s, 9 * s).fillCircle(x + 20 * s, y - 12 * s, 9 * s);
      g.fillStyle(COLORS.black).fillCircle(x - 20 * s, y - 12 * s, 3 * s).fillCircle(x + 20 * s, y - 12 * s, 3 * s);
    } else if (name === "Yesterday Dragon") {
      g.fillStyle(0xff8c50).fillEllipse(x, y, 128 * s, 78 * s);
      g.fillTriangle(x + 22*s, y - 32*s, x + 70*s, y - 55*s, x + 45*s, y - 8*s);
      g.fillStyle(COLORS.white).fillCircle(x + 28*s, y - 10*s, 8 * s);
      g.fillStyle(COLORS.black).fillCircle(x + 29*s, y - 10*s, 3 * s);
    } else if (name === "When-While Wizard") {
      g.fillStyle(COLORS.purple).fillEllipse(x, y - 30*s, 70*s, 28*s);
      g.fillStyle(COLORS.purple).fillRect(x - 16*s, y - 28*s, 32*s, 56*s);
      g.fillTriangle(x, y - 8*s, x - 48*s, y + 60*s, x + 48*s, y + 60*s);
      g.fillStyle(happy ? COLORS.gold : COLORS.lightBlue).fillCircle(x + 54*s, y - 42*s, 10*s);
    } else if (name === "Story Giant") {
      g.fillStyle(0x7e8b9f).fillRoundedRect(x - 42*s, y - 54*s, 84*s, 108*s, 16*s);
      g.fillStyle(COLORS.white).fillCircle(x - 16*s, y - 18*s, 8*s).fillCircle(x + 16*s, y - 18*s, 8*s);
      g.fillStyle(COLORS.black).fillCircle(x - 16*s, y - 18*s, 3*s).fillCircle(x + 16*s, y - 18*s, 3*s);
    } else {
      g.fillStyle(COLORS.purple).fillRoundedRect(x - 48*s, y - 48*s, 96*s, 96*s, 18*s);
      g.fillStyle(COLORS.white).fillCircle(x - 16*s, y - 12*s, 8*s).fillCircle(x + 16*s, y - 12*s, 8*s);
      g.fillStyle(COLORS.black).fillCircle(x - 16*s, y - 12*s, 3*s).fillCircle(x + 16*s, y - 12*s, 3*s);
    }
    const mouthY = y + 18*s;
    const mouth = this.add.graphics();
    mouth.lineStyle(4, COLORS.black);
    if (cry) {
      mouth.strokeArc(x, mouthY, 22*s, Phaser.Math.DegToRad(210), Phaser.Math.DegToRad(330), false);
      mouth.lineStyle(2, COLORS.blue);
      mouth.lineBetween(x - 22*s, y + 4*s, x - 28*s, y + 18*s);
      mouth.lineBetween(x + 22*s, y + 4*s, x + 28*s, y + 18*s);
    } else if (happy) {
      mouth.strokeArc(x, mouthY - 4*s, 22*s, Phaser.Math.DegToRad(20), Phaser.Math.DegToRad(160), false);
    } else {
      mouth.lineBetween(x - 18*s, mouthY, x + 18*s, mouthY);
    }
  }
  chooseByIndex(idx) { if (!this.answered && this.optionBoxes[idx]) this.submitAnswer(this.optionBoxes[idx].answer); }
  submitTimeout() { if (!this.answered) this.submitAnswer(null, true); }
  submitAnswer(answer, timedOut = false) {
    if (this.answered) return;
    this.answered = true;
    if (this.timerEvent) this.timerEvent.remove(false);
    const state = this.state;
    const q = this.question;
    state.totalQuestions += 1;
    let isCorrect = false;
    let yourAnswer = answer;
    if (!timedOut && answer === q.answer) {
      isCorrect = true;
      state.score += 10;
      state.totalCorrect += 1;
      this.feedbackText.setText("Monster is crying and losing power!");
    } else {
      state.lives -= 1;
      yourAnswer = timedOut ? "No answer (time up)" : answer;
      state.weakTopics[q.topic] = (state.weakTopics[q.topic] || 0) + 1;
      this.feedbackText.setText("Monster is smiling and gaining confidence!");
    }
    state.levelReport.push({ question: q.question, your_answer: yourAnswer, correct_answer: q.answer, is_correct: isCorrect });
    this.optionBoxes.forEach(item => {
      item.box.disableInteractive();
      if (item.answer === q.answer) item.box.setFillStyle(COLORS.green);
      else if (item.answer === answer && !isCorrect) item.box.setFillStyle(COLORS.red);
    });
    this.time.delayedCall(1100, () => {
      if (state.lives <= 0) { this.finishGame(false); return; }
      state.questionIndex += 1;
      if (state.questionIndex >= state.levels[state.levelIndex].questions.length) this.finishLevel();
      else { this.setRunState(state); this.scene.restart(); }
    });
  }
  finishLevel() {
    const state = this.state;
    const level = state.levels[state.levelIndex];
    const correct = state.levelReport.filter(x => x.is_correct).length;
    const wrong = state.levelReport.length - correct;
    state.levelSummaries.push({ title: level.name, correct, wrong });
    if (state.levelIndex === 0 && !state.badges.includes("Daily Hero")) state.badges.push("Daily Hero");
    state.pendingNext = (state.levelIndex + 1 >= state.levels.length) ? "boss" : "next-level";
    this.setRunState(state);
    this.scene.start("LevelReportScene");
  }
  finishGame(reachedEnd) {
    const state = this.state;
    const accuracy = state.totalQuestions ? Math.round((state.totalCorrect / state.totalQuestions) * 100) : 0;
    if (reachedEnd) {
      state.finalRank = "ULTIMATE ENGLISH CHAMPION 👑";
      if (!state.badges.includes("Final Boss Winner")) state.badges.push("Final Boss Winner");
    } else if (state.score >= 220) state.finalRank = "ENGLISH CHAMPION 🔥";
    else if (state.score >= 170) state.finalRank = "SUPER STUDENT 🌟";
    else state.finalRank = "BRAVE HERO 💪";
    if (accuracy === 100 && state.totalQuestions > 0 && !state.badges.includes("Accuracy Master")) state.badges.push("Accuracy Master");
    const highScore = Math.max(state.highScore || 0, state.score);
    if (highScore > (state.highScore || 0) && !state.badges.includes("New High Score")) state.badges.push("New High Score");
    state.highScore = highScore;
    const weak = Object.entries(state.weakTopics).sort((a,b) => b[1]-a[1]);
    const reportLines = [
      "======================================", "      JOSUE ENGLISH GAME REPORT", "======================================",
      `Player: ${state.playerName}`, `Final Score: ${state.score} ⭐`, `Accuracy: ${accuracy}%`,
      `Total Correct: ${state.totalCorrect}`, `Total Questions: ${state.totalQuestions}`,
      `Final Rank: ${state.finalRank}`, `High Score: ${state.highScore} ⭐`, "", "LEVEL SUMMARY",
      ...(state.levelSummaries.length ? state.levelSummaries.map(item => `- ${item.title}: ${item.correct} correct, ${item.wrong} wrong`) : ["- No level data available"]),
      "", "WEAK TOPICS", ...(weak.length ? weak.map(([topic, count]) => `- ${topic}: ${count}`) : ["- None"]),
      "", "BADGES", state.badges.length ? state.badges.join(", ") : "None", "======================================"
    ];
    state.finalReport = reportLines.join("\n");
    this.setRunState(state);
    this.savePersistentProgress({ highScore: state.highScore, badges: state.badges, playerName: state.playerName });
    this.scene.start("ResultsScene");
  }
}

class LevelReportScene extends BaseScene {
  constructor() {
    super("LevelReportScene");
  }
  create() {
    this.createStarfield();
    const state = this.getRunState();
    const title = state.pendingNext === "boss"
      ? `Level Report: ${state.levels[state.levels.length - 1].name}`
      : `Level Report: ${state.levels[state.levelIndex].name}`;
    this.drawTitle(title, 80, "#ffffff", 36);
    this.drawPanel(60, 120, 980, 540, COLORS.panel, COLORS.blue);
    const correct = state.levelReport.filter(x => x.is_correct).length;
    const wrong = state.levelReport.length - correct;
    this.centerText(GAME_W / 2, 165, `Correct: ${correct}   Wrong: ${wrong}`, 26, "#1e3b5b");
    let y = 220;
    state.levelReport.forEach((item, idx) => {
      this.add.text(90, y, `${idx + 1}. ${item.question}`, { fontFamily: "Arial", fontSize: "18px", color: "#28303c", wordWrap: { width: 900 } });
      y += 24;
      this.add.text(110, y, `${item.is_correct ? "✓ Correct" : "✗ Wrong"} | Your answer: ${item.your_answer} | Correct: ${item.correct_answer}`, {
        fontFamily: "Arial", fontSize: "17px", color: item.is_correct ? "#2e8b57" : "#d25555", wordWrap: { width: 860 }
      });
      y += 40;
    });
    this.centerText(GAME_W / 2, 630, "Press SPACE or click to continue", 22, "#845bb5");
    const continueFn = () => {
      state.levelReport = [];
      state.questionIndex = 0;
      if (state.pendingNext === "boss") {
        const pool = [];
        state.levels.forEach(level => pool.push(...level.questions));
        state.levels.push({ name: "Final Boss Battle", boss: "Story Giant", topic: "Mixed Review", questions: sample(pool, Math.min(10, pool.length)) });
        state.levelIndex = state.levels.length - 1;
        state.pendingNext = null;
        this.setRunState(state);
        this.scene.start("BossIntroScene");
      } else {
        state.levelIndex += 1;
        state.pendingNext = null;
        this.setRunState(state);
        this.scene.start("LevelIntroScene");
      }
    };
    this.input.keyboard.once("keydown-SPACE", continueFn);
    this.input.once("pointerdown", continueFn);
  }
}

class BossIntroScene extends BaseScene {
  constructor() {
    super("BossIntroScene");
  }
  create() {
    this.createStarfield();
    this.drawTitle("Final Boss Battle", 90, "#ff7b7b", 40);
    this.drawPanel(170, 150, 760, 320, 0xfff4f6, COLORS.red);
    this.centerText(GAME_W / 2, 250, "10 mixed questions. 3 lives. Final challenge.", 28, "#28303c");
    this.centerText(GAME_W / 2, 320, "Press SPACE or click to start", 24, "#8b1e3f");
    const g = this.add.graphics();
    g.fillStyle(COLORS.red).fillRoundedRect(730, 240, 160, 180, 20);
    g.fillStyle(COLORS.white).fillCircle(780, 300, 10).fillCircle(840, 300, 10);
    g.fillStyle(COLORS.black).fillCircle(780, 300, 4).fillCircle(840, 300, 4);
    g.fillStyle(COLORS.gold).fillRect(760, 240, 100, 18);
    this.input.keyboard.once("keydown-SPACE", () => this.scene.start("QuestionScene"));
    this.input.once("pointerdown", () => this.scene.start("QuestionScene"));
  }
}

class ResultsScene extends BaseScene {
  constructor() {
    super("ResultsScene");
  }
  create() {
    this.createStarfield();
    const state = this.getRunState();
    this.drawTitle("Mission Complete", 80, "#ffffff", 40);
    this.drawPanel(80, 130, 940, 540, COLORS.panel, COLORS.blue);
    this.centerText(GAME_W / 2, 180, state.finalRank, 30, state.finalRank.includes("CHAMPION") ? "#d25555" : "#1e3b5b");
    this.centerText(GAME_W / 2, 230, `Player: ${state.playerName} | Score: ${state.score} ⭐ | Accuracy: ${Math.round((state.totalCorrect / Math.max(1, state.totalQuestions))*100)}%`, 22, "#28303c", 900);
    this.centerText(GAME_W / 2, 270, `Badges: ${state.badges.join(", ") || "None"}`, 18, "#845bb5", 900);
    const preview = state.finalReport.split("\n").slice(0, 11);
    let y = 330;
    preview.forEach(line => {
      this.add.text(GAME_W / 2, y, line, { fontFamily: "Arial", fontSize: "18px", color: "#28303c", align: "center" }).setOrigin(0.5);
      y += 24;
    });
    this.centerText(GAME_W / 2, 630, "S = download report, R = play again", 22, "#ffd166");
    this.input.keyboard.on("keydown-R", () => this.scene.start("MenuScene"));
    this.input.keyboard.on("keydown-S", () => this.downloadReport());
  }
  downloadReport() {
    const state = this.getRunState();
    const blob = new Blob([state.finalReport], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `game_report_${state.playerName.replace(/\s+/g, "_")}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }
}

const config = {
  type: Phaser.AUTO,
  width: GAME_W,
  height: GAME_H,
  parent: "game-container",
  backgroundColor: "#0b1320",
  scene: [BootScene, MenuScene, LevelIntroScene, QuestionScene, LevelReportScene, BossIntroScene, ResultsScene]
};

new Phaser.Game(config);
</script>
